<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2b579a" />
    <title>wors</title>
    <link data-trunk rel="rust" data-bin="wors" />
    <link data-trunk rel="copy-file" href="assets/logo.png" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #d7d9dc;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .editor-loader {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        background: #d7d9dc;
        color: #1f2933;
      }

      .editor-loader[hidden] {
        display: none;
      }

      .editor-loader__panel {
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .editor-loader__mark {
        width: 42px;
        height: 42px;
        border: 4px solid rgb(255 255 255 / 0.72);
        border-top-color: #2b579a;
        border-radius: 50%;
        animation: editor-loader-spin 0.8s linear infinite;
      }

      .editor-loader__text {
        font-size: 14px;
        font-weight: 600;
      }

      @keyframes editor-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="editor-loader"
      class="editor-loader"
      role="status"
      aria-live="polite"
      aria-label="Loading editor"
    >
      <div class="editor-loader__panel">
        <div class="editor-loader__mark" aria-hidden="true"></div>
        <div class="editor-loader__text">Loading editor...</div>
      </div>
    </div>
    <canvas id="wors-canvas"></canvas>
  </body>
</html>
